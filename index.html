<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f12;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f1f1f1;
            --text-muted: #888;
            --siyam-grad: linear-gradient(135deg, #0052d4, #4364f7, #6fb1fc);
            --sanjida-grad: linear-gradient(135deg, #11998e, #38ef7d);
            --other-bg: rgba(255, 255, 255, 0.08);
            --error-color: #ff4b4b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 82, 212, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(17, 153, 142, 0.15), transparent 25%);
        }

        /* --- Login Screen --- */
        #login-screen {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 10px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        select:focus, input[type="password"]:focus {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        select option {
            background: #1a1d24;
            color: #fff;
        }

        .login-btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        .login-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: var(--error-color);
            font-size: 13px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            border-color: var(--error-color) !important;
        }

        /* --- Chat Screen --- */
        #chat-screen {
            display: none;
            width: 100%;
            max-width: 900px;
            height: 95vh;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 18px;
            color: #fff;
        }

        .avatar.siyam { background: var(--siyam-grad); }
        .avatar.sanjida { background: var(--sanjida-grad); }

        .user-details h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .user-details p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: none;
        }
        .chat-messages::-webkit-scrollbar { display: none; }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
            position: relative;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.own {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-wrapper.other {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .message-wrapper.own.siyam .message-bubble {
            background: var(--siyam-grad);
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .message-wrapper.own.sanjida .message-bubble {
            background: var(--sanjida-grad);
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .message-wrapper.other .message-bubble {
            background: var(--other-bg);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .message-wrapper.own .message-meta {
            justify-content: flex-end;
        }

        .status-icon {
            font-size: 10px;
        }
        .status-icon.seen {
            color: #4da6ff;
        }

        .message-actions {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .message-wrapper.own .message-actions { right: calc(100% + 10px); }
        
        .message-wrapper:hover .message-actions { opacity: 1; }

        .action-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-muted);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .action-btn.delete:hover { color: var(--error-color); }

        .chat-input-container {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 8px 12px;
            transition: border-color 0.3s ease, background 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: rgba(255,255,255,0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 15px;
            resize: none;
            max-height: 120px;
            min-height: 24px;
            padding: 8px 4px;
            outline: none;
            line-height: 1.5;
            scrollbar-width: none;
        }
        #message-input::-webkit-scrollbar { display: none; }
        #message-input::placeholder { color: var(--text-muted); }

        .send-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            margin-bottom: 2px;
        }

        .send-btn.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .send-btn.active:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .edit-badge {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #fff;
            display: none;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }
        
        .edit-badge button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
        }
        .edit-badge button:hover { color: #fff; }

        @media (max-width: 768px) {
            #chat-screen {
                height: 100vh;
                border-radius: 0;
                border: none;
            }
            .message-wrapper { max-width: 85%; }
            .message-actions {
                position: relative;
                top: 0;
                transform: none;
                justify-content: flex-end;
                opacity: 1;
                margin-top: 4px;
            }
            .message-wrapper.own .message-actions { right: 0; }
            .action-btn { width: 24px; height: 24px; font-size: 12px; }
            .input-footer { display: none; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-header">
            <h1>Identity Check</h1>
        </div>
        <div class="input-group">
            <label>Select User</label>
            <select id="user-select">
                <option value="Siyam">Siyam</option>
                <option value="Sanjida">Sanjida</option>
            </select>
        </div>
        <div class="input-group">
            <label>Passcode</label>
            <input type="password" id="password-input" placeholder="••••">
        </div>
        <div class="error-msg" id="error-msg">Incorrect passcode</div>
        <button class="login-btn" id="login-btn">Authenticate</button>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <div class="user-info">
                <div class="avatar" id="header-avatar">S</div>
                <div class="user-details">
                    <h2 id="header-name">User</h2>
                    <p>Secure Connection</p>
                </div>
            </div>
            <button class="logout-btn" id="logout-btn">Disconnect</button>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            </div>

        <div class="chat-input-container">
            <div class="edit-badge" id="edit-badge">
                <span>Editing message...</span>
                <button id="cancel-edit">✕</button>
            </div>
            <div class="input-wrapper">
                <textarea id="message-input" rows="1" placeholder="Type a message..."></textarea>
                <button class="send-btn" id="send-btn">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
            <div class="input-footer">
                <span><kbd>Ctrl</kbd> + <kbd>Enter</kbd> to send</span>
                <span id="char-count">0 chars</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, onSnapshot, query, orderBy, 
            serverTimestamp, doc, updateDoc, deleteDoc 
        } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSROS0f85aTwtrA4solgDzL-TxUAllWV0",
            authDomain: "privatechat-71a12.firebaseapp.com",
            projectId: "privatechat-71a12",
            storageBucket: "privatechat-71a12.firebasestorage.app",
            messagingSenderId: "291257231309",
            appId: "1:291257231309:web:559fa92840116e616fc684",
            measurementId: "G-2ZSK1HKHFY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messagesRef = collection(db, 'messages');

        // DOM Elements
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const userSelect = document.getElementById('user-select');
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');
        
        const headerAvatar = document.getElementById('header-avatar');
        const headerName = document.getElementById('header-name');
        const logoutBtn = document.getElementById('logout-btn');
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const charCount = document.getElementById('char-count');
        const editBadge = document.getElementById('edit-badge');
        const cancelEditBtn = document.getElementById('cancel-edit');

        let currentUser = null;
        let unsubscribe = null;
        let editingDocId = null;

        // --- AUTH LOGIC ---
        const checkAuth = () => {
            const session = sessionStorage.getItem('chat_session');
            if (session === 'Siyam' || session === 'Sanjida') {
                currentUser = session;
                showChat();
            }
        };

        loginBtn.addEventListener('click', () => {
            const user = userSelect.value;
            const pass = passwordInput.value;
            
            if (pass === '1357') {
                sessionStorage.setItem('chat_session', user);
                currentUser = user;
                showChat();
            } else {
                passwordInput.classList.add('shake');
                errorMsg.style.opacity = '1';
                setTimeout(() => {
                    passwordInput.classList.remove('shake');
                    errorMsg.style.opacity = '0';
                }, 400);
            }
        });

        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('chat_session');
            window.location.reload();
        });

        const showChat = () => {
            loginScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            headerName.textContent = currentUser;
            headerAvatar.textContent = currentUser.charAt(0);
            headerAvatar.className = `avatar ${currentUser.toLowerCase()}`;
            initChat();
        };

        // --- CHAT LOGIC ---
        const initChat = () => {
            const q = query(messagesRef, orderBy('timestamp', 'asc'));
            
            unsubscribe = onSnapshot(q, (snapshot) => {
                let isAtBottom = chatMessages.scrollHeight - chatMessages.scrollTop <= chatMessages.clientHeight + 50;
                
                chatMessages.innerHTML = '';
                
                snapshot.forEach((docSnapshot) => {
                    const data = docSnapshot.data();
                    const docId = docSnapshot.id;
                    renderMessage(docId, data);
                    
                    // Mark as seen if it's from the other person and not seen yet
                    if (data.sender !== currentUser && !data.seen) {
                        updateDoc(doc(db, 'messages', docId), { seen: true });
                    }
                });

                if (isAtBottom) {
                    scrollToBottom();
                }
            });
        };

        const renderMessage = (id, data) => {
            const isOwn = data.sender === currentUser;
            const timeString = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Sending...';
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isOwn ? 'own' : 'other'} ${data.sender.toLowerCase()}`;
            wrapper.id = `msg-${id}`;
            
            let statusIcon = '';
            if (isOwn) {
                if (data.seen) statusIcon = '<span class="status-icon seen">✓✓</span>';
                else if (data.delivered) statusIcon = '<span class="status-icon">✓</span>';
            }

            const editedTag = data.edited ? `<span style="font-style: italic;">(edited)</span>` : '';

            let actionsHtml = '';
            if (isOwn) {
                actionsHtml = `
                    <div class="message-actions">
                        <button class="action-btn edit" data-id="${id}" data-text="${escapeHtml(data.text)}">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <button class="action-btn delete" data-id="${id}">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
            }

            wrapper.innerHTML = `
                <div class="message-bubble">
                    <div class="text">${escapeHtml(data.text).replace(/\n/g, '<br>')}</div>
                    <div class="message-meta">
                        <span>${timeString}</span>
                        ${editedTag}
                        ${statusIcon}
                    </div>
                </div>
                ${actionsHtml}
            `;

            chatMessages.appendChild(wrapper);

            // Bind action buttons
            if (isOwn) {
                wrapper.querySelector('.edit').addEventListener('click', (e) => {
                    const btn = e.currentTarget;
                    startEdit(btn.getAttribute('data-id'), btn.getAttribute('data-text'));
                });
                wrapper.querySelector('.delete').addEventListener('click', (e) => {
                    const btn = e.currentTarget;
                    deleteMessage(btn.getAttribute('data-id'));
                });
            }
        };

        const escapeHtml = (unsafe) => {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        const scrollToBottom = () => {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        };

        // --- INPUT & SEND LOGIC ---
        const adjustTextarea = () => {
            messageInput.style.height = '24px';
            messageInput.style.height = (messageInput.scrollHeight) + 'px';
            const len = messageInput.value.length;
            charCount.textContent = `${len} chars`;
            if (len > 0) sendBtn.classList.add('active');
            else sendBtn.classList.remove('active');
        };

        messageInput.addEventListener('input', adjustTextarea);
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            messageInput.value = '';
            adjustTextarea();

            if (editingDocId) {
                const id = editingDocId;
                cancelEdit();
                await updateDoc(doc(db, 'messages', id), {
                    text: text,
                    edited: true
                });
            } else {
                await addDoc(messagesRef, {
                    sender: currentUser,
                    text: text,
                    timestamp: serverTimestamp(),
                    edited: false,
                    delivered: true,
                    seen: false
                });
            }
            scrollToBottom();
        }

        // --- EDIT & DELETE LOGIC ---
        const startEdit = (id, text) => {
            editingDocId = id;
            messageInput.value = text;
            editBadge.style.display = 'flex';
            adjustTextarea();
            messageInput.focus();
        };

        const cancelEdit = () => {
            editingDocId = null;
            messageInput.value = '';
            editBadge.style.display = 'none';
            adjustTextarea();
        };

        cancelEditBtn.addEventListener('click', cancelEdit);

        const deleteMessage = async (id) => {
            if(confirm("Delete message for everyone?")) {
                await deleteDoc(doc(db, 'messages', id));
            }
        };

        // Initialize
        checkAuth();
    </script>
</body>
</html>
